<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Étape de montage</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181c; --border: #2a2d35;
      --accent: #4f8ef7; --accent-glow: rgba(79,142,247,0.15);
      --warn: #f5a623; --warn-glow: rgba(245,166,35,0.2);
      --text: #e8eaf0; --text-dim: #6b7280;
      --mono: 'JetBrains Mono','Fira Code',monospace;
      --sans: 'Inter',system-ui,sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

    /* Header */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(14,15,17,0.95) 60%, transparent);
      backdrop-filter: blur(4px);
    }
    .step-label { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); }
    .step-title { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 2px; }
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-dim); cursor: pointer; transition: color .15s, border-color .15s; text-decoration: none;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); }
    .icon-btn svg { width: 15px; height: 15px; }
    .icon-btn.accent { border-color: var(--accent); color: var(--accent); }

    /* Viewer */
    model-viewer { width: 100%; height: 100vh; background-color: var(--bg); --poster-color: var(--bg); }

    /* Timeline */
    #timeline {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      display: none; flex-direction: column;
      padding: 12px 16px 24px; gap: 8px;
      background: linear-gradient(to top, rgba(14,15,17,0.97) 70%, transparent);
      backdrop-filter: blur(6px);
    }
    #timeline.visible { display: flex; }

    /* Marqueur tooltip */
    #marker-toast {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      background: var(--warn-glow); border: 1px solid var(--warn);
      border-radius: 8px; pointer-events: none;
      opacity: 0; transition: opacity .2s;
      max-width: calc(100% - 0px);
    }
    #marker-toast.visible { opacity: 1; }
    #marker-toast svg { width: 13px; height: 13px; color: var(--warn); flex-shrink: 0; }
    #marker-toast span { font-size: 12px; font-family: var(--mono); color: var(--warn); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Contrôles */
    .tl-controls { display: flex; align-items: center; gap: 10px; }
    .tl-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; min-width: 80px; text-align: right; }

    /* Scrubbar */
    .scrub-wrap { flex: 1; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; }
    .scrub-track { width: 100%; height: 3px; background: var(--border); border-radius: 3px; position: relative; }
    .scrub-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; pointer-events: none; }
    .scrub-thumb {
      position: absolute; top: 50%; left: 0%;
      width: 13px; height: 13px;
      background: white; border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 2px var(--accent);
      pointer-events: none; transition: transform .1s;
    }
    .scrub-wrap:active .scrub-thumb { transform: translate(-50%, -50%) scale(1.3); }

    /* Marqueurs sur la scrubbar */
    .marker-pip {
      position: absolute; top: 50%;
      width: 10px; height: 10px;
      background: var(--warn); border-radius: 2px;
      transform: translate(-50%, -50%) rotate(45deg);
      cursor: pointer; pointer-events: all;
      transition: transform .15s;
      z-index: 2;
    }
    .marker-pip:hover { transform: translate(-50%, -50%) rotate(45deg) scale(1.4); }

    /* Error */
    #error-screen { display: none; position: fixed; inset: 0; align-items: center; justify-content: center; flex-direction: column; gap: 12px; background: var(--bg); text-align: center; padding: 40px; }
    #error-screen.visible { display: flex; }
    .error-code { font-family: var(--mono); font-size: 48px; font-weight: 700; color: var(--border); }
    .error-msg { font-size: 15px; color: var(--text-dim); max-width: 280px; line-height: 1.5; }
    .error-link { margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--accent); text-decoration: none; }

    /* Loading */
    .progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); width: 0%; transition: width .3s; z-index: 20; }

    /* Hint */
    .hint {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px;
      background: rgba(22,24,28,.85); border: 1px solid var(--border);
      border-radius: 100px; padding: 8px 20px;
      backdrop-filter: blur(8px); pointer-events: none;
      opacity: 1; transition: opacity .5s;
    }
    .hint.hidden { opacity: 0; }
    .hint-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); font-family: var(--mono); white-space: nowrap; }
  </style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

<header>
  <div>
    <div class="step-label" id="step-label">Chargement…</div>
    <div class="step-title" id="step-title"></div>
  </div>
  <a href="index.html" class="icon-btn" title="Retour">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
  </a>
</header>

<model-viewer id="viewer" camera-controls touch-action="none" autoplay shadow-intensity="0.6" environment-image="neutral" exposure="1.1" ar ar-modes="webxr scene-viewer quick-look"></model-viewer>

<div id="timeline">
  <!-- Toast marqueur -->
  <div id="marker-toast">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2.5 5 5.5.8-4 3.9.9 5.5L8 13.5l-4.9 2.7.9-5.5L0 6.8l5.5-.8z"/></svg>
    <span id="marker-label">—</span>
  </div>

  <div class="tl-controls">
    <!-- Rewind -->
    <button class="icon-btn" id="btn-rewind" title="Retour au début">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h1.5v10H3V3zm9.5 0L7 8l5.5 5V3z"/></svg>
    </button>
    <!-- Play/Pause -->
    <button class="icon-btn accent" id="btn-play">
      <svg id="icon-play" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l9 5-9 5V3z"/></svg>
      <svg id="icon-pause" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M5 3h2v10H5V3zm4 0h2v10H9V3z"/></svg>
    </button>
    <!-- Scrubbar -->
    <div class="scrub-wrap" id="scrub-wrap">
      <div class="scrub-track" id="scrub-track">
        <div class="scrub-fill" id="scrub-fill"></div>
        <div class="scrub-thumb" id="scrub-thumb"></div>
      </div>
    </div>
    <!-- Vitesse -->
    <button class="icon-btn" id="btn-speed">
      <span style="font-family:var(--mono);font-size:10px;font-weight:700" id="speed-label">1×</span>
    </button>
    <!-- Temps -->
    <div class="tl-time" id="tl-time">0.0 / 0.0s</div>
  </div>
</div>

<div class="hint" id="hint">
  <span class="hint-item">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><circle cx="8" cy="8" r="5"/><path d="M8 5v3l2 1.5"/></svg>
    Glisser pour orbiter
  </span>
  <span class="hint-item">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><path d="M8 3v10M5 6l3-3 3 3M5 10l3 3 3-3"/></svg>
    Pincer pour zoomer
  </span>
</div>

<div id="error-screen">
  <div class="error-code">404</div>
  <div class="error-msg">Modèle introuvable.<br>Vérifiez que le fichier GLB est bien dans <code>models/</code>.</div>
  <a href="index.html" class="error-link">← Retour à l'index</a>
</div>

<script>
  // ─── Params URL ───
  const params  = new URLSearchParams(window.location.search);
  const modelId = params.get('model') || '';
  const title   = params.get('title') || '';
  const step    = params.get('step') || '';
  const fps     = parseFloat(params.get('fps') || '24');
  const markersRaw = params.get('markers') || '';

  // Décoder les marqueurs (JSON encodé en base64 pour éviter les pb d'URL)
  let markers = [];
  try { if (markersRaw) markers = JSON.parse(atob(markersRaw)); } catch {}

  // ─── Éléments DOM ───
  const viewer      = document.getElementById('viewer');
  const progress    = document.getElementById('progress');
  const hint        = document.getElementById('hint');
  const errorScreen = document.getElementById('error-screen');
  const stepLabel   = document.getElementById('step-label');
  const stepTitle   = document.getElementById('step-title');
  const timeline    = document.getElementById('timeline');
  const btnPlay     = document.getElementById('btn-play');
  const iconPlay    = document.getElementById('icon-play');
  const iconPause   = document.getElementById('icon-pause');
  const btnRewind   = document.getElementById('btn-rewind');
  const btnSpeed    = document.getElementById('btn-speed');
  const speedLabel  = document.getElementById('speed-label');
  const scrubWrap   = document.getElementById('scrub-wrap');
  const scrubTrack  = document.getElementById('scrub-track');
  const scrubFill   = document.getElementById('scrub-fill');
  const scrubThumb  = document.getElementById('scrub-thumb');
  const tlTime      = document.getElementById('tl-time');
  const markerToast = document.getElementById('marker-toast');
  const markerLabel = document.getElementById('marker-label');

  if (!modelId) {
    errorScreen.classList.add('visible');
    viewer.style.display = 'none';
  } else {
    stepLabel.textContent = step ? `Étape ${step}` : 'Étape';
    stepTitle.textContent = decodeURIComponent(title);
    viewer.src = `models/${modelId}.glb`;
  }

  // Progress chargement
  viewer.addEventListener('progress', (e) => {
    const pct = Math.round(e.detail.totalProgress * 100);
    progress.style.width = pct + '%';
    if (pct >= 100) setTimeout(() => { progress.style.opacity = '0'; }, 400);
  });
  viewer.addEventListener('error', () => { errorScreen.classList.add('visible'); viewer.style.display = 'none'; });

  // ─── État animation ───
  let playing  = false;
  let duration = 0;
  const speeds = [0.25, 0.5, 1, 2];
  let speedIdx = 2;

  viewer.addEventListener('load', () => {
    const anims = viewer.availableAnimations;
    if (!anims || anims.length === 0) return;
    viewer.animationName = anims[0];
    viewer.timeScale = 1;
    viewer.play({ repetitions: 1 });
    playing = true;
    setPlayUI(true);
    setTimeout(() => {
      duration = viewer.duration || 0;
      timeline.classList.add('visible');
      buildMarkerPips();
      startTick();
    }, 150);
  });

  function setPlayUI(p) {
    iconPlay.style.display  = p ? 'none' : '';
    iconPause.style.display = p ? '' : 'none';
  }

  // ─── Marqueurs sur la scrubbar ───
  let toastTimeout = null;

  function buildMarkerPips() {
    if (!markers.length || duration === 0) return;
    markers.forEach(m => {
      const t   = m.frame / fps;
      const pct = Math.min(100, (t / duration) * 100);
      const pip = document.createElement('div');
      pip.className = 'marker-pip';
      pip.style.left = pct + '%';
      pip.title = m.label;
      pip.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        viewer.currentTime = t;
        viewer.pause();
        playing = false;
        setPlayUI(false);
        showToast(m.label);
      });
      pip.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        e.preventDefault();
        viewer.currentTime = t;
        viewer.pause();
        playing = false;
        setPlayUI(false);
        showToast(m.label);
      }, { passive: false });
      scrubTrack.appendChild(pip);
    });
  }

  function showToast(label) {
    markerLabel.textContent = label;
    markerToast.classList.add('visible');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => markerToast.classList.remove('visible'), 3000);
  }

  // ─── Ticker RAF ───
  let rafId = null;
  let lastMarkerIdx = -1;

  function startTick() {
    if (rafId) return;
    function tick() {
      if (duration > 0) {
        const t   = viewer.currentTime || 0;
        const pct = (t / duration) * 100;
        scrubFill.style.width  = pct + '%';
        scrubThumb.style.left  = pct + '%';
        tlTime.textContent = `${t.toFixed(1)} / ${duration.toFixed(1)}s`;

        // Détection fin d'animation
        if (playing && t >= duration - 0.05) {
          viewer.pause();
          playing = false;
          setPlayUI(false);
          lastMarkerIdx = -1;
        }

        if (playing && markers.length) {
          const nearby = markers.findIndex(m => Math.abs((m.frame / fps) - t) < 0.15);
          if (nearby !== -1 && nearby !== lastMarkerIdx) {
            lastMarkerIdx = nearby;
            showToast(markers[nearby].label);
          } else if (nearby === -1) {
            lastMarkerIdx = -1;
          }
        }
      }
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  // ─── Play/Pause ───
  btnPlay.addEventListener('click', () => {
    if (playing) {
      viewer.pause(); playing = false;
    } else {
      // Si à la fin, remettre au début
      if (duration > 0 && viewer.currentTime >= duration - 0.05) {
        viewer.currentTime = 0;
      }
      viewer.play({ repetitions: 1 }); playing = true;
    }
    setPlayUI(playing);
  });

  // ─── Rewind ───
  btnRewind.addEventListener('click', () => {
    viewer.currentTime = 0;
    if (!playing) { viewer.play({ repetitions: 1 }); playing = true; setPlayUI(true); }
  });

  // ─── Vitesse ───
  btnSpeed.addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % speeds.length;
    viewer.timeScale = speeds[speedIdx];
    speedLabel.textContent = speeds[speedIdx] + '×';
  });

  // ─── Scrubbar ───
  function scrubTo(e) {
    if (duration === 0) return;
    const rect   = scrubWrap.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    viewer.currentTime = ratio * duration;
  }

  let scrubbing = false;
  scrubWrap.addEventListener('mousedown',  (e) => { scrubbing = true; viewer.pause(); playing = false; setPlayUI(false); scrubTo(e); });
  scrubWrap.addEventListener('touchstart', (e) => { scrubbing = true; viewer.pause(); playing = false; setPlayUI(false); scrubTo(e); }, { passive: true });
  window.addEventListener('mousemove',  (e) => { if (scrubbing) scrubTo(e); });
  window.addEventListener('touchmove',  (e) => { if (scrubbing) scrubTo(e); }, { passive: true });
  window.addEventListener('mouseup',   () => { scrubbing = false; });
  window.addEventListener('touchend',  () => { scrubbing = false; });

  // ─── Hint ───
  let hintDismissed = false;
  ['touchstart','mousedown'].forEach(evt => {
    document.addEventListener(evt, () => { if (!hintDismissed) { hintDismissed = true; hint.classList.add('hidden'); } }, { passive: true });
  });
  setTimeout(() => hint.classList.add('hidden'), 4000);
</script>
</body>
</html>
