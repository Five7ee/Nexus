<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Étape de montage — Nexus Builder</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FDFCF8;
      --text: #2C3333;
      --text-dim: #6B7280;
      --sidebar: #344E41;
      --sidebar-text: #DAD7CD;
      --active: #A3B18A;
      --hover: #3A5A40;
      --card: #F1F3E9;
      --border: #E9EEDC;
      --accent: #BC6C25;
      --accent-glow: rgba(188,108,37,0.12);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

    /* ─── Header ─── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--hover);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: var(--sidebar-text);
      text-decoration: none; transition: background .15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .back-btn svg { width: 15px; height: 15px; }

    .step-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--active); }
    .step-title { font-size: 15px; font-weight: 700; color: white; margin-top: 1px; }

    .header-right { display: flex; gap: 8px; align-items: center; }

    .ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      height: 34px; padding: 0 12px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: var(--sidebar-text);
      font-size: 12px; font-family: var(--mono); font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .ctrl-btn.accent { background: var(--active); border-color: var(--active); color: var(--sidebar); }
    .ctrl-btn.accent:hover { background: #B8C99A; }
    .ctrl-btn svg { width: 14px; height: 14px; }

    /* ─── Viewer ─── */
    model-viewer { width: 100%; height: 100vh; background-color: var(--bg); --poster-color: var(--bg); }

    /* ─── Timeline ─── */
    #timeline {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      display: none; flex-direction: column;
      padding: 10px 16px 20px; gap: 8px;
      background: linear-gradient(to top, rgba(253,252,248,0.98) 70%, transparent);
      backdrop-filter: blur(6px);
      border-top: 1px solid var(--border);
    }
    #timeline.visible { display: flex; }

    /* Toast zone */
    #toast-zone { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }

    #marker-toast {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      background: var(--accent-glow); border: 1px solid rgba(188,108,37,0.35);
      border-radius: 10px; pointer-events: none;
      opacity: 0; transition: opacity .2s;
    }
    #marker-toast.visible { opacity: 1; }
    #marker-toast svg { width: 12px; height: 12px; color: var(--accent); flex-shrink: 0; }
    #marker-toast span { font-size: 12px; font-family: var(--mono); color: var(--accent); font-weight: 700; }

    #btn-next {
      display: none; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--sidebar); border: none;
      border-radius: 10px; cursor: pointer;
      font-size: 13px; font-family: var(--sans); font-weight: 600;
      color: white; transition: background .15s, transform .1s;
    }
    #btn-next.visible { display: flex; }
    #btn-next:active { transform: scale(0.97); background: var(--hover); }
    #btn-next svg { width: 13px; height: 13px; }

    /* Contrôles timeline */
    .tl-controls { display: flex; align-items: center; gap: 10px; }
    .tl-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; min-width: 80px; text-align: right; }

    /* Scrubbar */
    .scrub-wrap { flex: 1; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; }
    .scrub-track { width: 100%; height: 3px; background: var(--border); border-radius: 3px; position: relative; }
    .scrub-fill { height: 100%; background: var(--sidebar); border-radius: 3px; width: 0%; pointer-events: none; }
    .scrub-thumb {
      position: absolute; top: 50%; left: 0%;
      width: 14px; height: 14px;
      background: var(--sidebar); border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 3px white, 0 0 0 4px var(--active);
      pointer-events: none; transition: transform .1s;
    }
    .scrub-wrap:active .scrub-thumb { transform: translate(-50%, -50%) scale(1.2); }

    /* Marqueurs pips */
    .marker-pip {
      position: absolute; top: 50%;
      width: 10px; height: 10px;
      background: var(--accent); border-radius: 2px;
      transform: translate(-50%, -50%) rotate(45deg);
      cursor: pointer; pointer-events: all;
      transition: transform .15s; z-index: 2;
    }
    .marker-pip:hover { transform: translate(-50%, -50%) rotate(45deg) scale(1.4); }

    /* Error */
    #error-screen { display: none; position: fixed; inset: 0; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: var(--bg); text-align: center; padding: 40px; }
    #error-screen.visible { display: flex; }
    .error-code { font-family: var(--mono); font-size: 56px; font-weight: 900; color: var(--border); }
    .error-msg { font-size: 15px; color: var(--text-dim); max-width: 300px; line-height: 1.6; }
    .error-link { font-family: var(--mono); font-size: 12px; color: var(--sidebar); text-decoration: none; padding: 8px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }

    /* Loading bar */
    .progress-bar { position: fixed; top: 57px; left: 0; height: 2px; background: var(--active); width: 0%; transition: width .3s; z-index: 20; }

    /* Hint */
    .hint {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px;
      background: rgba(253,252,248,0.9); border: 1px solid var(--border);
      border-radius: 100px; padding: 8px 20px;
      backdrop-filter: blur(8px); pointer-events: none;
      box-shadow: 0 4px 12px rgba(44,51,51,0.08);
      opacity: 1; transition: opacity .5s;
    }
    .hint.hidden { opacity: 0; }
    .hint-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); font-family: var(--mono); white-space: nowrap; }
  </style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

<header>
  <div class="header-left">
    <a href="index.html" class="back-btn" title="Retour">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
    </a>
    <div>
      <div class="step-label" id="step-label">Chargement…</div>
      <div class="step-title" id="step-title"></div>
    </div>
  </div>
  <div class="header-right">
    <button class="ctrl-btn" id="btn-rewind" title="Retour au début">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h1.5v10H3V3zm9.5 0L7 8l5.5 5V3z"/></svg>
    </button>
    <button class="ctrl-btn accent" id="btn-play">
      <svg id="icon-play" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l9 5-9 5V3z"/></svg>
      <svg id="icon-pause" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M5 3h2v10H5V3zm4 0h2v10H9V3z"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-speed">
      <span id="speed-label">1×</span>
    </button>
  </div>
</header>

<model-viewer id="viewer" camera-controls touch-action="none" autoplay shadow-intensity="0.8" environment-image="neutral" exposure="1.2" ar ar-modes="webxr scene-viewer quick-look"></model-viewer>

<div id="timeline">
  <div id="toast-zone">
    <div id="marker-toast">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="5" y="5" width="6" height="6" transform="rotate(45 8 8)"/></svg>
      <span id="marker-label">—</span>
    </div>
    <button id="btn-next">
      Continuer
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3l5 5-5 5"/></svg>
    </button>
  </div>

  <div class="tl-controls">
    <div class="scrub-wrap" id="scrub-wrap">
      <div class="scrub-track" id="scrub-track">
        <div class="scrub-fill" id="scrub-fill"></div>
        <div class="scrub-thumb" id="scrub-thumb"></div>
      </div>
    </div>
    <div class="tl-time" id="tl-time">0.0 / 0.0s</div>
  </div>
</div>

<div class="hint" id="hint">
  <span class="hint-item">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><circle cx="8" cy="8" r="5"/><path d="M8 5v3l2 1.5"/></svg>
    Glisser pour orbiter
  </span>
  <span class="hint-item">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><path d="M8 3v10M5 6l3-3 3 3M5 10l3 3 3-3"/></svg>
    Pincer pour zoomer
  </span>
</div>

<div id="error-screen">
  <div class="error-code">404</div>
  <div class="error-msg">Modèle introuvable.<br>Vérifiez que le fichier GLB est bien dans <code>models/</code>.</div>
  <a href="index.html" class="error-link">← Retour à l'index</a>
</div>

<script>
  const params     = new URLSearchParams(window.location.search);
  const modelId    = params.get('model') || '';
  const title      = params.get('title') || '';
  const step       = params.get('step') || '';
  const fps        = parseFloat(params.get('fps') || '24');
  const markersRaw = params.get('markers') || '';

  let markers = [];
  try { if (markersRaw) markers = JSON.parse(atob(markersRaw)); } catch {}

  const viewer      = document.getElementById('viewer');
  const progress    = document.getElementById('progress');
  const hint        = document.getElementById('hint');
  const errorScreen = document.getElementById('error-screen');
  const stepLabel   = document.getElementById('step-label');
  const stepTitle   = document.getElementById('step-title');
  const timeline    = document.getElementById('timeline');
  const btnPlay     = document.getElementById('btn-play');
  const iconPlay    = document.getElementById('icon-play');
  const iconPause   = document.getElementById('icon-pause');
  const btnRewind   = document.getElementById('btn-rewind');
  const btnSpeed    = document.getElementById('btn-speed');
  const speedLabel  = document.getElementById('speed-label');
  const scrubWrap   = document.getElementById('scrub-wrap');
  const scrubTrack  = document.getElementById('scrub-track');
  const scrubFill   = document.getElementById('scrub-fill');
  const scrubThumb  = document.getElementById('scrub-thumb');
  const tlTime      = document.getElementById('tl-time');
  const markerToast = document.getElementById('marker-toast');
  const markerLabel = document.getElementById('marker-label');
  const btnNext     = document.getElementById('btn-next');

  if (!modelId) {
    errorScreen.classList.add('visible');
    viewer.style.display = 'none';
  } else {
    stepLabel.textContent = step ? `Étape ${step}` : 'Étape';
    stepTitle.textContent = decodeURIComponent(title);
    viewer.src = `models/${modelId}.glb`;
  }

  viewer.addEventListener('progress', (e) => {
    const pct = Math.round(e.detail.totalProgress * 100);
    progress.style.width = pct + '%';
    if (pct >= 100) setTimeout(() => { progress.style.opacity = '0'; }, 400);
  });
  viewer.addEventListener('error', () => { errorScreen.classList.add('visible'); viewer.style.display = 'none'; });

  let playing = false, duration = 0;
  const speeds = [0.25, 0.5, 1, 2];
  let speedIdx = 2;
  let currentMarkerIdx = -1, looping = false, loopStart = 0, loopEnd = 0;

  viewer.addEventListener('load', () => {
    const anims = viewer.availableAnimations;
    if (!anims || anims.length === 0) return;
    viewer.animationName = anims[0];
    viewer.timeScale = 1;
    viewer.play({ repetitions: Infinity });
    playing = true; setPlayUI(true);
    setTimeout(() => {
      duration = viewer.duration || 0;
      timeline.classList.add('visible');
      buildMarkerPips();
      startTick();
    }, 150);
  });

  function setPlayUI(p) {
    iconPlay.style.display  = p ? 'none' : '';
    iconPause.style.display = p ? '' : 'none';
  }

  function buildMarkerPips() {
    if (!markers.length || duration === 0) return;
    markers.forEach((m, i) => {
      const t   = m.frame / fps;
      const pct = Math.min(100, (t / duration) * 100);
      const pip = document.createElement('div');
      pip.className = 'marker-pip';
      pip.style.left = pct + '%';
      pip.addEventListener('click', (e) => { e.stopPropagation(); jumpToMarker(i); });
      pip.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); jumpToMarker(i); }, { passive: false });
      scrubTrack.appendChild(pip);
    });
  }

  function jumpToMarker(i) {
    const m = markers[i];
    viewer.currentTime = m.frame / fps;
    viewer.pause(); playing = false; setPlayUI(false);
    showToast(m.label);
  }

  function startLoop(i) {
    const m = markers[i];
    currentMarkerIdx = i; looping = true;
    loopEnd   = m.frame / fps;
    loopStart = m.loop_start !== undefined ? m.loop_start / fps : Math.max(0, loopEnd - 1.0);
    viewer.currentTime = loopStart;
    viewer.play({ repetitions: Infinity }); playing = true; setPlayUI(true);
    showToast(m.label, true);
    btnNext.classList.add('visible');
  }

  btnNext.addEventListener('click', continueAfterMarker);
  btnNext.addEventListener('touchend', (e) => { e.preventDefault(); continueAfterMarker(); });

  function continueAfterMarker() {
    looping = false;
    btnNext.classList.remove('visible');
    markerToast.classList.remove('visible');
    viewer.currentTime = loopEnd;
    viewer.play({ repetitions: Infinity }); playing = true; setPlayUI(true);
    currentMarkerIdx = -1;
  }

  let toastTimeout = null;
  function showToast(label, persistent = false) {
    markerLabel.textContent = label;
    markerToast.classList.add('visible');
    clearTimeout(toastTimeout);
    if (!persistent) toastTimeout = setTimeout(() => markerToast.classList.remove('visible'), 3000);
  }

  let rafId = null, lastAutoMarkerIdx = -1;
  function startTick() {
    if (rafId) return;
    function tick() {
      if (duration > 0) {
        const t   = viewer.currentTime || 0;
        const pct = (t / duration) * 100;
        scrubFill.style.width = pct + '%';
        scrubThumb.style.left = pct + '%';
        tlTime.textContent = `${t.toFixed(1)} / ${duration.toFixed(1)}s`;

        if (playing) {
          if (looping && t >= loopEnd - 0.05) { viewer.currentTime = loopStart; }
          if (!looping && markers.length) {
            const nearby = markers.findIndex(m => { const mt = m.frame / fps; return t >= mt - 0.08 && t <= mt + 0.08; });
            if (nearby !== -1 && nearby !== lastAutoMarkerIdx) {
              lastAutoMarkerIdx = nearby;
              if (markers[nearby].loop_start !== undefined) startLoop(nearby);
              else showToast(markers[nearby].label);
            } else if (nearby === -1) lastAutoMarkerIdx = -1;
          }
          if (!looping && t >= duration - 0.05) { viewer.pause(); playing = false; setPlayUI(false); }
        }
      }
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  btnPlay.addEventListener('click', () => {
    if (playing) { viewer.pause(); playing = false; }
    else {
      if (!looping && duration > 0 && viewer.currentTime >= duration - 0.05) { viewer.currentTime = 0; lastAutoMarkerIdx = -1; }
      viewer.play({ repetitions: Infinity }); playing = true;
    }
    setPlayUI(playing);
  });

  btnRewind.addEventListener('click', () => {
    looping = false; btnNext.classList.remove('visible'); markerToast.classList.remove('visible');
    currentMarkerIdx = -1; lastAutoMarkerIdx = -1;
    viewer.currentTime = 0;
    viewer.play({ repetitions: Infinity }); playing = true; setPlayUI(true);
  });

  btnSpeed.addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % speeds.length;
    viewer.timeScale = speeds[speedIdx];
    speedLabel.textContent = speeds[speedIdx] + '×';
  });

  function scrubTo(e) {
    if (duration === 0) return;
    const rect    = scrubWrap.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio   = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    viewer.currentTime = ratio * duration;
    looping = false; btnNext.classList.remove('visible');
  }

  let scrubbing = false;
  scrubWrap.addEventListener('mousedown',  (e) => { scrubbing = true; viewer.pause(); playing = false; setPlayUI(false); scrubTo(e); });
  scrubWrap.addEventListener('touchstart', (e) => { scrubbing = true; viewer.pause(); playing = false; setPlayUI(false); scrubTo(e); }, { passive: true });
  window.addEventListener('mousemove',  (e) => { if (scrubbing) scrubTo(e); });
  window.addEventListener('touchmove',  (e) => { if (scrubbing) scrubTo(e); }, { passive: true });
  window.addEventListener('mouseup',   () => { scrubbing = false; });
  window.addEventListener('touchend',  () => { scrubbing = false; });

  let hintDismissed = false;
  ['touchstart','mousedown'].forEach(evt => {
    document.addEventListener(evt, () => { if (!hintDismissed) { hintDismissed = true; hint.classList.add('hidden'); } }, { passive: true });
  });
  setTimeout(() => hint.classList.add('hidden'), 4000);
</script>
</body>
</html>
