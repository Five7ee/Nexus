<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manuel de montage — Nexus Builder</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FDFCF8;
      --text: #2C3333;
      --text-dim: #6B7280;
      --sidebar: #344E41;
      --sidebar-text: #DAD7CD;
      --active: #A3B18A;
      --hover: #3A5A40;
      --card: #F1F3E9;
      --border: #E9EEDC;
      --border-dark: #DAD7CD;
      --accent: #BC6C25;
      --warn: #f5a623;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    /* ─── Nav ─── */
    nav {
      background: var(--sidebar); border-bottom: 1px solid var(--hover);
      padding: 16px 24px; position: sticky; top: 0; z-index: 50;
    }
    .nav-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 800; color: white; text-decoration: none; }
    .nav-brand svg { color: var(--active); }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 12px;
      font-size: 14px; font-weight: 500; color: var(--sidebar-text);
      text-decoration: none; transition: background .15s, color .15s;
    }
    .nav-link:hover { background: var(--hover); color: white; }
    .nav-link.active { background: var(--active); color: var(--sidebar); }
    @media (max-width: 768px) { .nav-links { display: none; } }

    /* ─── Main ─── */
    main { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ─── Header ─── */
    .page-header {
      background: linear-gradient(135deg, #2C3333 0%, #344E41 60%, #1A2E22 100%);
      border-radius: 24px; padding: 48px; margin-bottom: 40px;
      position: relative; overflow: hidden; color: white;
    }
    .page-header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top right, rgba(255,255,255,0.1), transparent);
    }
    .page-header-inner { position: relative; z-index: 1; max-width: 600px; }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 100px;
      background: rgba(163,177,138,0.2); border: 1px solid rgba(163,177,138,0.3);
      font-size: 11px; font-weight: 700; color: #E9EEDC;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 16px;
    }
    .page-title { font-size: clamp(28px, 4vw, 42px); font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 12px; }
    .page-title span { color: var(--active); }
    .page-desc { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.6; }

    /* ─── Steps grid ─── */
    .steps { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    /* ─── Card ─── */
    .card {
      background: white; border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .card:hover { border-color: var(--sidebar); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(52,78,65,0.12); }

    .card-img {
      width: 100%; aspect-ratio: 16/9;
      background: var(--card);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border); border-top-color: var(--sidebar);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-body { padding: 20px; }
    .card-step {
      font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--sidebar); font-weight: 700; margin-bottom: 4px;
    }
    .card-title { font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; color: var(--text); }
    .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 16px; }

    /* Chips marqueurs */
    .card-markers { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .marker-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      background: rgba(188,108,37,0.08); border: 1px solid rgba(188,108,37,0.25);
      border-radius: 100px; font-size: 11px; font-family: var(--mono); color: var(--accent);
    }
    .marker-chip svg { width: 8px; height: 8px; flex-shrink: 0; }

    .card-footer { display: flex; align-items: center; justify-content: flex-end; padding-top: 16px; border-top: 1px solid var(--border); }
    .open-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: var(--sidebar); border-radius: 10px;
      color: white; font-size: 13px; font-weight: 600;
      text-decoration: none; transition: background .15s;
    }
    .open-btn:hover { background: var(--hover); }
    .open-btn svg { width: 13px; height: 13px; }

    .empty { max-width: 900px; margin: 60px auto; text-align: center; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
    .empty code { font-family: var(--mono); font-size: 12px; background: var(--card); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }

    #preview-renderer { position: fixed; left: -9999px; top: 0; width: 320px; height: 180px; visibility: hidden; pointer-events: none; }

    @media (max-width: 480px) { .steps { grid-template-columns: 1fr; } main { padding: 24px 16px 60px; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="nav-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg>
      Nexus Builder
    </a>
    <div class="nav-links">
      <a href="#" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Manuel de montage
      </a>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-eyebrow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
        Guide d'assemblage interactif
      </div>
      <h1 class="page-title" id="project-title">Chargement…</h1>
      <p class="page-desc" id="project-desc"></p>
    </div>
  </div>

  <div class="steps" id="steps-grid"></div>
  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">📦</div>
    <h2>Aucune étape configurée</h2>
    <p>Éditez <code>steps.json</code> pour ajouter vos étapes.</p>
  </div>
</main>

<model-viewer id="preview-renderer" shadow-intensity="0.4" environment-image="neutral" exposure="1.1"></model-viewer>

<script>
const BASE_URL = (() => {
  const loc = window.location.href.replace(/index\.html$/, '');
  return loc.endsWith('/') ? loc : loc + '/';
})();

const previewRenderer = document.getElementById('preview-renderer');
const previewQueue = [];
let previewBusy = false;

async function init() {
  let config;
  try {
    const res = await fetch('steps.json');
    if (!res.ok) throw new Error();
    config = await res.json();
  } catch {
    document.getElementById('project-title').textContent = 'Erreur';
    document.getElementById('project-desc').textContent = 'Impossible de charger steps.json.';
    return;
  }

  const fps = config.fps || 24;
  document.title = `${config.project} — Manuel de montage`;
  document.getElementById('project-title').textContent = config.project;
  document.getElementById('project-desc').textContent = config.description || '';

  const grid = document.getElementById('steps-grid');
  const emptyState = document.getElementById('empty-state');
  if (!config.steps || config.steps.length === 0) { emptyState.style.display = 'block'; return; }

  for (const s of config.steps) {
    const markersB64 = s.markers && s.markers.length ? btoa(JSON.stringify(s.markers)) : '';
    const viewerUrl = `${BASE_URL}view.html`
      + `?model=${encodeURIComponent(s.model)}`
      + `&title=${encodeURIComponent(s.title)}`
      + `&step=${s.step}`
      + `&fps=${fps}`
      + (markersB64 ? `&markers=${encodeURIComponent(markersB64)}` : '');

    const { card, imgEl } = buildCard(s, viewerUrl);
    grid.appendChild(card);

    if (s.image) {
      imgEl.src = s.image; imgEl.style.display = 'block';
      card.querySelector('.spinner').style.display = 'none';
    } else {
      previewQueue.push({ modelId: s.model, imgEl, spinner: card.querySelector('.spinner') });
    }
  }
  processPreviewQueue();
}

function buildCard(s, url) {
  const div = document.createElement('div');
  div.className = 'card';

  const imgEl = document.createElement('img');
  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img';
  imgWrap.appendChild(spinner);
  imgWrap.appendChild(imgEl);
  imgEl.onload = () => { spinner.style.display = 'none'; imgEl.style.display = 'block'; };
  imgEl.onerror = () => { spinner.style.display = 'none'; };

  let markersHtml = '';
  if (s.markers && s.markers.length) {
    const chips = s.markers.map(m => `
      <span class="marker-chip">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="5" y="5" width="6" height="6" transform="rotate(45 8 8)"/></svg>
        ${m.label}
      </span>`).join('');
    markersHtml = `<div class="card-markers">${chips}</div>`;
  }

  div.innerHTML = `
    <div class="card-body">
      <div class="card-step">Étape ${s.step}</div>
      <div class="card-title">${s.title}</div>
      ${s.description ? `<div class="card-desc">${s.description}</div>` : ''}
      ${markersHtml}
      <div class="card-footer">
        <a href="${url}" class="open-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3H3v10h10V9M9 3h4v4M13 3L8 8"/></svg>
          Voir l'animation 3D
        </a>
      </div>
    </div>
  `;
  div.insertBefore(imgWrap, div.firstChild);
  div.addEventListener('click', (e) => { if (!e.target.closest('a')) window.location.href = url; });
  return { card: div, imgEl };
}

function processPreviewQueue() {
  if (previewBusy || previewQueue.length === 0) return;
  previewBusy = true;
  const { modelId, imgEl, spinner } = previewQueue.shift();

  function onLoad() {
    setTimeout(() => {
      previewRenderer.toBlob({ idealAspect: true }).then(blob => {
        if (blob) imgEl.src = URL.createObjectURL(blob);
        else if (spinner) spinner.style.display = 'none';
        cleanup();
      }).catch(() => { if (spinner) spinner.style.display = 'none'; cleanup(); });
    }, 400);
  }
  function onError() { if (spinner) spinner.style.display = 'none'; cleanup(); }
  function cleanup() {
    previewRenderer.removeEventListener('load', onLoad);
    previewRenderer.removeEventListener('error', onError);
    previewRenderer.src = '';
    previewBusy = false;
    processPreviewQueue();
  }
  previewRenderer.addEventListener('load', onLoad, { once: true });
  previewRenderer.addEventListener('error', onError, { once: true });
  previewRenderer.src = `models/${modelId}.glb`;
}

init();
</script>
</body>
</html>
