<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manuel de montage</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181c; --surface-2: #1e2126;
      --border: #2a2d35; --accent: #4f8ef7; --accent-glow: rgba(79,142,247,0.15);
      --warn: #f5a623;
      --text: #e8eaf0; --text-dim: #6b7280;
      --mono: 'JetBrains Mono','Fira Code',monospace;
      --sans: 'Inter',system-ui,sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding-bottom: 80px; }

    .site-header { padding: 48px 24px 40px; max-width: 900px; margin: 0 auto; border-bottom: 1px solid var(--border); }
    .site-header .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    .site-header h1 { font-size: clamp(24px,5vw,36px); font-weight: 700; line-height: 1.15; letter-spacing: -.02em; }
    .site-header p { margin-top: 10px; font-size: 15px; color: var(--text-dim); max-width: 480px; line-height: 1.6; }

    .steps { max-width: 900px; margin: 0 auto; padding: 40px 24px 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color .2s, transform .2s; cursor: pointer; }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .card-img { width: 100%; aspect-ratio: 16/9; background: var(--surface-2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-body { padding: 16px; }
    .card-step { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .card-title { font-size: 15px; font-weight: 600; line-height: 1.35; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 14px; }

    /* Marqueurs sur la card */
    .card-markers { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .marker-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px;
      background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3);
      border-radius: 100px; font-size: 11px; font-family: var(--mono); color: var(--warn);
    }
    .marker-chip svg { width: 9px; height: 9px; flex-shrink: 0; }

    .card-footer { display: flex; align-items: center; justify-content: flex-end; padding-top: 12px; border-top: 1px solid var(--border); }
    .open-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: var(--accent-glow); border: 1px solid var(--accent);
      border-radius: 6px; color: var(--accent); font-size: 12px;
      font-family: var(--mono); text-decoration: none; transition: background .15s;
    }
    .open-btn:hover { background: rgba(79,142,247,.25); }
    .open-btn svg { width: 11px; height: 11px; }

    .empty { max-width: 900px; margin: 60px auto; padding: 0 24px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 16px; }
    .empty h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
    .empty code { font-family: var(--mono); font-size: 12px; background: var(--surface); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }

    #preview-renderer { position: fixed; left: -9999px; top: 0; width: 320px; height: 180px; visibility: hidden; pointer-events: none; }

    @media (max-width: 480px) { .steps { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="site-header">
  <div class="eyebrow">Manuel de montage</div>
  <h1 id="project-title">Chargement…</h1>
  <p id="project-desc"></p>
</header>

<div class="steps" id="steps-grid"></div>
<div class="empty" id="empty-state" style="display:none">
  <div class="empty-icon">📦</div>
  <h2>Aucune étape configurée</h2>
  <p>Éditez <code>steps.json</code> pour ajouter vos étapes.</p>
</div>

<model-viewer id="preview-renderer" shadow-intensity="0.4" environment-image="neutral" exposure="1.1"></model-viewer>

<script>
const BASE_URL = (() => {
  const loc = window.location.href.replace(/index\.html$/, '');
  return loc.endsWith('/') ? loc : loc + '/';
})();

const previewRenderer = document.getElementById('preview-renderer');
const previewQueue = [];
let previewBusy = false;

async function init() {
  let config;
  try {
    const res = await fetch('steps.json');
    if (!res.ok) throw new Error();
    config = await res.json();
  } catch {
    document.getElementById('project-title').textContent = 'Erreur';
    document.getElementById('project-desc').textContent = 'Impossible de charger steps.json.';
    return;
  }

  const fps = config.fps || 24;
  document.title = `${config.project} — Manuel de montage`;
  document.getElementById('project-title').textContent = config.project;
  document.getElementById('project-desc').textContent = config.description || '';

  const grid = document.getElementById('steps-grid');
  const emptyState = document.getElementById('empty-state');
  if (!config.steps || config.steps.length === 0) { emptyState.style.display = 'block'; return; }

  for (const s of config.steps) {
    // Encoder les marqueurs en base64 pour l'URL
    const markersB64 = s.markers && s.markers.length
      ? btoa(JSON.stringify(s.markers))
      : '';

    const viewerUrl = `${BASE_URL}view.html`
      + `?model=${encodeURIComponent(s.model)}`
      + `&title=${encodeURIComponent(s.title)}`
      + `&step=${s.step}`
      + `&fps=${fps}`
      + (markersB64 ? `&markers=${encodeURIComponent(markersB64)}` : '');

    const { card, imgEl } = buildCard(s, viewerUrl);
    grid.appendChild(card);

    if (s.image) {
      imgEl.src = s.image;
      imgEl.style.display = 'block';
      card.querySelector('.spinner').style.display = 'none';
    } else {
      previewQueue.push({ modelId: s.model, imgEl, spinner: card.querySelector('.spinner') });
    }
  }

  processPreviewQueue();
}

function buildCard(s, url) {
  const div = document.createElement('div');
  div.className = 'card';

  const imgEl = document.createElement('img');
  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img';
  imgWrap.appendChild(spinner);
  imgWrap.appendChild(imgEl);
  imgEl.onload = () => { spinner.style.display = 'none'; imgEl.style.display = 'block'; };
  imgEl.onerror = () => { spinner.style.display = 'none'; };

  // Chips marqueurs
  let markersHtml = '';
  if (s.markers && s.markers.length) {
    const chips = s.markers.map(m => `
      <span class="marker-chip">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="5" y="5" width="6" height="6" transform="rotate(45 8 8)"/></svg>
        ${m.label}
      </span>`).join('');
    markersHtml = `<div class="card-markers">${chips}</div>`;
  }

  div.innerHTML = `
    <div class="card-body">
      <div class="card-step">Étape ${s.step}</div>
      <div class="card-title">${s.title}</div>
      ${s.description ? `<div class="card-desc">${s.description}</div>` : ''}
      ${markersHtml}
      <div class="card-footer">
        <a href="${url}" class="open-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3H3v10h10V9M9 3h4v4M13 3L8 8"/></svg>
          Voir en 3D
        </a>
      </div>
    </div>
  `;
  div.insertBefore(imgWrap, div.firstChild);
  div.addEventListener('click', (e) => { if (!e.target.closest('a')) window.location.href = url; });

  return { card: div, imgEl };
}

function processPreviewQueue() {
  if (previewBusy || previewQueue.length === 0) return;
  previewBusy = true;
  const { modelId, imgEl, spinner } = previewQueue.shift();

  function onLoad() {
    setTimeout(() => {
      previewRenderer.toBlob({ idealAspect: true }).then(blob => {
        if (blob) { imgEl.src = URL.createObjectURL(blob); }
        else { if(spinner) spinner.style.display='none'; }
        cleanup();
      }).catch(() => { if(spinner) spinner.style.display='none'; cleanup(); });
    }, 400);
  }
  function onError() { if(spinner) spinner.style.display='none'; cleanup(); }
  function cleanup() {
    previewRenderer.removeEventListener('load', onLoad);
    previewRenderer.removeEventListener('error', onError);
    previewRenderer.src = '';
    previewBusy = false;
    processPreviewQueue();
  }

  previewRenderer.addEventListener('load', onLoad, { once: true });
  previewRenderer.addEventListener('error', onError, { once: true });
  previewRenderer.src = `models/${modelId}.glb`;
}

init();
</script>
</body>
</html>
